<!DOCTYPE html>
<html>
<head>
    <title>Fall Detection</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { text-align: center; font-family: Arial; }
        h1 { color: #333; }
        #result { font-size: 30px; margin-top: 20px; }
    </style>
</head>
<body>

<h1>📱 Fall Detection</h1>
<button onclick="start()">Start Detection</button>
<div id="result">Waiting...</div>

<script>
let buffer = [];

function start() {
    if (typeof DeviceMotionEvent.requestPermission === "function") {
        DeviceMotionEvent.requestPermission().then(response => {
            if (response === "granted") {
                window.addEventListener("devicemotion", handleMotion);
            }
        });
    } else {
        window.addEventListener("devicemotion", handleMotion);
    }
}

function handleMotion(event) {
    let acc = event.accelerationIncludingGravity;
    let gyro = event.rotationRate;

    if (!acc || !gyro) return;

    let dataPoint = [
        acc.x || 0,
        acc.y || 0,
        acc.z || 0,
        gyro.alpha || 0,
        gyro.beta || 0,
        gyro.gamma || 0
    ];

    buffer.push(dataPoint);

    if (buffer.length >= 50) {
        sendData(buffer.slice(-50));
    }
}

function sendData(windowData) {
    fetch("http://YOUR_IP:5000/predict", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({ data: windowData })
    })
    .then(res => res.json())
    .then(data => {
        document.getElementById("result").innerText = data.prediction;
    });
}
</script>

</body>
</html>
